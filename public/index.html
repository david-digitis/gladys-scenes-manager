<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scenes Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div class="header-left">
        <span class="header-dot"></span>
        <h1>Scenes Manager</h1>
      </div>
      <div class="header-right">
        <span id="weather-badge" class="weather-badge"></span>
      </div>
    </div>
  </header>

  <!-- Navigation -->
  <nav class="nav">
    <div class="nav-inner">
      <button class="nav-btn active" data-tab="ambiances">Ambiances</button>
      <button class="nav-btn" data-tab="capturer">Capturer</button>
      <button class="nav-btn" data-tab="config">Configuration</button>
    </div>
  </nav>

  <!-- Tab: Ambiances -->
  <section id="tab-ambiances" class="tab-content active">
    <div id="scenes-list">
      <div class="empty-state">Chargement...</div>
    </div>
  </section>

  <!-- Tab: Capturer -->
  <section id="tab-capturer" class="tab-content">
    <!-- Step 1: Select room -->
    <div id="capture-step1">
      <div class="card">
        <h2>Capturer une ambiance</h2>
        <p class="text-secondary">Reglez vos lumieres comme vous le souhaitez, puis capturez l'etat actuel.</p>

        <div class="form-group">
          <label>Piece</label>
          <select id="capture-room" class="input">
            <option value="">Chargement...</option>
          </select>
        </div>

        <div class="form-group">
          <label>Ambiance</label>
          <div class="radio-group">
            <label class="radio-label">
              <input type="radio" name="capture-mode" value="new" checked>
              Nouvelle ambiance
            </label>
            <label class="radio-label">
              <input type="radio" name="capture-mode" value="existing">
              Ajouter un mode a une existante
            </label>
          </div>
        </div>

        <div id="capture-new-fields">
          <div class="form-group">
            <label>Nom</label>
            <input type="text" id="capture-name" class="input" placeholder="Ex: Soiree cozy">
          </div>
          <div class="form-group">
            <label>Cle (auto)</label>
            <input type="text" id="capture-key" class="input" placeholder="soiree-cozy" readonly>
          </div>
        </div>

        <div id="capture-existing-fields" style="display:none">
          <div class="form-group">
            <label>Ambiance existante</label>
            <select id="capture-existing-scene" class="input">
              <option value="">Choisir...</option>
            </select>
          </div>
        </div>

        <button id="btn-scan" class="btn btn-primary">Scanner les lumieres</button>
      </div>
    </div>

    <!-- Step 2: Review & save -->
    <div id="capture-step2" style="display:none">
      <div class="card">
        <div class="step2-header">
          <h2 id="capture-title">Capture</h2>
          <div class="step2-header-actions">
            <button id="btn-refresh" class="btn btn-outline-blue btn-sm">Rafraichir</button>
            <button id="btn-back" class="btn btn-ghost btn-sm">Retour</button>
          </div>
        </div>

        <!-- Mode selector -->
        <label style="font-size:13px;color:var(--text-secondary);margin-bottom:8px;display:block">Mode</label>
        <div class="mode-selector" id="mode-selector">
          <button class="mode-selector-btn active" data-mode="night">Nuit</button>
          <button class="mode-selector-btn" data-mode="day-clear">Jour beau temps</button>
          <button class="mode-selector-btn" data-mode="day-cloudy">Jour mauvais temps</button>
        </div>

        <!-- Devices -->
        <div id="capture-devices" class="devices-list"></div>

        <!-- Mode status -->
        <div id="mode-status" class="mode-status"></div>

        <button id="btn-save" class="btn btn-primary btn-lg">Enregistrer ce mode</button>
      </div>
    </div>
  </section>

  <!-- Tab: Config -->
  <section id="tab-config" class="tab-content">
    <div class="card">
      <h2>Configuration</h2>

      <div class="form-group">
        <label>URL Gladys</label>
        <input type="text" id="cfg-gladys-url" class="input" placeholder="http://localhost:8585">
      </div>

      <div class="form-group">
        <label>API Key Gladys</label>
        <input type="text" id="cfg-gladys-key" class="input" placeholder="Cle API">
      </div>

      <hr class="separator">

      <div class="form-group">
        <label>Latitude</label>
        <input type="number" id="cfg-lat" class="input" step="0.0001">
      </div>

      <div class="form-group">
        <label>Longitude</label>
        <input type="number" id="cfg-lon" class="input" step="0.0001">
      </div>

      <div class="form-group">
        <label>Cle API OpenWeatherMap</label>
        <input type="text" id="cfg-owm-key" class="input" placeholder="Cle OWM">
      </div>

      <div class="form-group">
        <label>Seuil nuageux (%)</label>
        <input type="number" id="cfg-cloudy" class="input" min="0" max="100" value="40">
      </div>

      <div class="form-group">
        <label>Cache meteo (secondes)</label>
        <input type="number" id="cfg-cache" class="input" min="60" value="600">
      </div>

      <div class="btn-group">
        <button id="btn-save-config" class="btn btn-primary">Enregistrer</button>
        <button id="btn-test-gladys" class="btn btn-outline-blue">Tester Gladys</button>
        <button id="btn-test-weather" class="btn btn-outline-blue">Tester Meteo</button>
      </div>

      <div id="config-status" class="status-box" style="display:none"></div>
    </div>
  </section>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <script src="app.js"></script>
</body>
</html>
